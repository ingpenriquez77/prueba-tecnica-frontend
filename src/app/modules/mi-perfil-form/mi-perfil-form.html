<div class="form-container">
  <div class="form-card">
    <h2>📝 Editar Mis Datos de Perfil</h2>
    <p class="subtitle">Actualiza tus credenciales personales de acceso</p>

    <div *ngIf="errorMensaje" class="alert-error">
      {{ errorMensaje }}
    </div>

    <form (ngSubmit)="guardar()" #f="ngForm">

      <div class="form-grid">
        <div class="form-group">
          <label for="usuario">Nickname / Login Usuario</label>
          <input type="text" id="usuario" name="usuario" [(ngModel)]="usuario.usuario" placeholder="Ej. pedro.enriquez" required>
        </div>
      </div>

      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre_completo" [(ngModel)]="usuario.nombre_completo" placeholder="Pedro Rafael Enriquez Nevarez" required>
      </div>

      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo_electronico" [(ngModel)]="usuario.correo_electronico" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="password">
            Contraseña 
            <small style="color: #64748b; font-weight: normal; display: inline;">
              (Dejar vacío para mantener la actual)
            </small>
          </label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            [(ngModel)]="usuario.password" 
            placeholder="******"> 
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono de Contacto (Opcional)</label>
          <input type="text" id="telefono" name="telefono" [(ngModel)]="usuario.telefono" placeholder="6671234567">
        </div>
      </div>

      <div class="form-group">
        <label>Foto de Perfil (Opcional)</label>
        <div class="avatar-upload-zone">
          <div class="avatar-preview-box">
            <img *ngIf="usuario.foto_perfil" [src]="usuario.foto_perfil" alt="Vista previa">
            <div *ngIf="!usuario.foto_perfil" class="avatar-placeholder">👤</div>
          </div>
          <div class="avatar-input-box">
            <input type="file" id="foto" accept="image/*" (change)="onFotoChange($event)">
            <p class="file-help">Formatos aceptados: JPG, PNG. Intenta usar imágenes ligeras.</p>
          </div>
        </div>
      </div>

      <!-- 🛡️ NOTA DE SEGURIDAD: Se omite la sección NoSQL de 'perfil_ids' radio buttons 
           para evitar auto-escalación o des-escalación de privilegios -->

      <div class="form-actions">
        <button type="button" routerLink="/productos" class="btn-cancel">Cancelar</button>
        <button type="submit" [disabled]="!f.valid || cargando" class="btn-submit">
          {{ cargando ? 'Guardando...' : 'Actualizar Mis Datos' }}
        </button>
      </div>

    </form>
  </div>
</div>
