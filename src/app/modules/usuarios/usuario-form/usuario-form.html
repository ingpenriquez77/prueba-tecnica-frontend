<div class="form-container">
  <div class="form-card">
    <h2>{{ esEdicion ? '📝 Editar Usuario' : '👥 Nuevo Usuario Sistema' }}</h2>
    <p class="subtitle">Sincronizado con el esquema de MongoDB</p>

    <div *ngIf="errorMensaje" class="alert-error">
      {{ errorMensaje }}
    </div>

    <form (ngSubmit)="guardar()" #f="ngForm">

      <div class="form-grid">
        <div class="form-group">
          <label for="usuario">Nickname / Login Usuario</label>
          <input type="text" id="usuario" name="usuario" [(ngModel)]="usuario.usuario" placeholder="Ej. pedro.enriquez" required>
        </div>
      </div>

      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre_completo" [(ngModel)]="usuario.nombre_completo" placeholder="Pedro Rafael Enriquez Nevarez" required>
      </div>

      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input type="email" id="correo" name="correo_electronico" [(ngModel)]="usuario.correo_electronico" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="form-grid">
        <div class="form-group" *ngIf="!esEdicion">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" [(ngModel)]="usuario.password" placeholder="******" required>
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono de Contacto</label>
          <input type="text" id="telefono" name="telefono" [(ngModel)]="usuario.telefono" placeholder="6671234567" required>
        </div>
      </div>

      <div class="form-group">
        <label>Foto de Perfil</label>
        <div class="avatar-upload-zone">
          <div class="avatar-preview-box">
            <img *ngIf="usuario.foto_perfil" [src]="usuario.foto_perfil" alt="Vista previa">
            <div *ngIf="!usuario.foto_perfil" class="avatar-placeholder">👤</div>
          </div>
          <div class="avatar-input-box">
            <input type="file" id="foto" accept="image/*" (change)="onFotoChange($event)">
            <p class="file-help">Formatos aceptados: JPG, PNG. Intenta usar imágenes ligeras.</p>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Roles / Perfiles Asignados</label>
        <div class="roles-box">
          <div *ngFor="let perf of perfilesDisponibles" class="role-item">
            <input
              type="checkbox"
              [id]="perf.id"
              [checked]="tienePerfil(perf.id!)"
              (change)="onPerfilSelect(perf.id!, $event)">
            <label [for]="perf.id" class="checkbox-label">{{ perf.nombre_perfil }}</label>
          </div>
          <div *ngIf="perfilesDisponibles.length === 0" class="no-roles">
            No hay perfiles registrados en BD. Créalos primero.
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" routerLink="/usuarios" class="btn-cancel">Cancelar</button>
        <button type="submit" [disabled]="!f.valid || cargando" class="btn-submit">
          {{ cargando ? 'Guardando...' : (esEdicion ? 'Actualizar' : 'Registrar') }}
        </button>
      </div>

    </form>
  </div>
</div>
