<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Panel de Control - Acceso Administrativo</p>

    <div *ngIf="errorMensaje" class="alert-error">
      {{ errorMensaje }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">

      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input
          type="email"
          id="correo"
          name="correo_electronico"
          [(ngModel)]="credenciales.correo_electronico"
          placeholder="ejemplo@empresa.com"
          required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credenciales.password"
          placeholder="••••••••"
          required>
        
        <div class="forgot-password-container">
          <a routerLink="/recuperar" class="link-forgot">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <button type="submit" [disabled]="cargando" class="btn-login">
        {{ cargando ? 'Verificando...' : 'Ingresar al Sistema' }}
      </button>

    </form>
  </div>
</div>
