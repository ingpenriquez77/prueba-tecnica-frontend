<div class="login-container">
  <div class="login-card">
    <h2>Recuperar Contraseña</h2>
    <p class="subtitle">Ingresa tu correo para recibir tus credenciales de acceso.</p>

    <div *ngIf="errorMensaje" class="alert alert-danger">{{ errorMensaje }}</div>
    <div *ngIf="mensajeExito" class="alert alert-success">{{ mensajeExito }}</div>

    <form (ngSubmit)="onRecuperar()" #recuperarForm="ngForm">
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="correo"
          placeholder="ejemplo@correo.com"
          required>
      </div>

      <button type="submit" [disabled]="cargando" class="btn-login">
        {{ cargando ? 'Verificando...' : 'Enviar Credenciales' }}
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/login">⬅️ Volver al Inicio de Sesión</a>
    </div>
  </div>
</div>
